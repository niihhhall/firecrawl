name: firecrawl
services:
  playwright-service:
    build: ./apps/playwright-service-ts
    environment:
      - PORT=3000
      - BLOCK_MEDIA=true
    networks:
      - backend

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=firecrawl
      - POSTGRES_PASSWORD=firecrawl
      - POSTGRES_DB=firecrawl
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firecrawl"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-alpine
    networks:
      - backend
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  firecrawl-api:
    build:
      context: ./apps/api
      args:
        - COREPACK_INTEGRITY_KEYS=0
    environment:
      - REDIS_URL=redis://redis:6379
      - REDIS_RATE_LIMIT_URL=redis://redis:6379
      - PLAYWRIGHT_MICROSERVICE_URL=http://playwright-service:3000
      - PORT=3002
      - HOST=0.0.0.0
      - BULL_AUTH_KEY=markeye_secret_key
      - USE_DB_AUTHENTICATION=false
      - NUQ_DATABASE_URL=postgresql://firecrawl:firecrawl@postgres:5432/firecrawl
      - NUQ_DATABASE_URL_LISTEN=postgresql://firecrawl:firecrawl@postgres:5432/firecrawl
      - NUQ_RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - SUPABASE_ANON_TOKEN=placeholder
      - SUPABASE_URL=placeholder
      - SUPABASE_SERVICE_TOKEN=placeholder
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
      playwright-service:
        condition: service_started
    ports:
      - "3002:3002"
    networks:
      - backend

  worker:
    build:
      context: ./apps/api
      args:
        - COREPACK_INTEGRITY_KEYS=0
    environment:
      - REDIS_URL=redis://redis:6379
      - REDIS_RATE_LIMIT_URL=redis://redis:6379
      - PLAYWRIGHT_MICROSERVICE_URL=http://playwright-service:3000
      - PORT=3002
      - HOST=0.0.0.0
      - BULL_AUTH_KEY=markeye_secret_key
      - USE_DB_AUTHENTICATION=false
      - NUQ_DATABASE_URL=postgresql://firecrawl:firecrawl@postgres:5432/firecrawl
      - NUQ_DATABASE_URL_LISTEN=postgresql://firecrawl:firecrawl@postgres:5432/firecrawl
      - NUQ_RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - SUPABASE_ANON_TOKEN=placeholder
      - SUPABASE_URL=placeholder
      - SUPABASE_SERVICE_TOKEN=placeholder
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
      playwright-service:
        condition: service_started
      firecrawl-api:
        condition: service_started
    command: ["node", "dist/src/services/queue-worker.js"]
    networks:
      - backend

  redis:
    image: redis:alpine
    networks:
      - backend
    command: redis-server --bind 0.0.0.0

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge
